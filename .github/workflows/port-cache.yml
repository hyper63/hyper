name: 🏎 Test & Deploy Cache Port

on:
  pull_request:
    branches:
      - main
    paths:
      - "packages/port-cache/**"
  push:
    branches:
      - main
    paths:
      - "packages/port-cache/**"
    tags:
      - 'hyper-port-cache@*'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        deno-version: [2.x]

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}

      - name: ⚡ Run Tests
        working-directory: packages/port-cache
        run: |
          deno task test
        env:
          CI: true

  publish:
    if: startsWith(github.ref, 'refs/tags/hyper-port-cache@')
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: ✨ Publish to JSR
        working-directory: packages/port-cache
        run: |
          npx jsr publish
